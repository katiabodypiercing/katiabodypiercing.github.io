<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Joias - Kátia Body Piercing</title>  <style> body {     margin: 0;     font-family: Arial, sans-serif;     background: black;     color: white;     text-align: center; }  h2 {     margin-top: 20px;     color: gold; /* 🔥 mesma cor da index */ }  .divider {     width: 80%;     height: 1px;     background: linear-gradient(to right, transparent, gold, transparent);     margin: 25px auto; }  .gallery {     display: grid;     grid-template-columns: repeat(2, 1fr);     gap: 10px;     padding: 10px; }  .gallery img {     width: 100%;     height: 160px;     object-fit: cover;     border-radius: 10px;     cursor: pointer; }  /* LIGHTBOX */ .lightbox {     position: fixed;     display: none;     top: 0;     left: 0;     width: 100%;     height: 100%;     background: rgba(0,0,0,0.95);     justify-content: center;     align-items: center; }  .lightbox img {     max-width: 90%;     max-height: 80%; }  .close {     position: absolute;     top: 20px;     right: 20px;     font-size: 30px;     cursor: pointer; }  /* SETAS */ .prev, .next {     position: absolute;     top: 50%;     font-size: 50px;     color: white;     cursor: pointer;     user-select: none;     transform: translateY(-50%);     padding: 10px;     background: rgba(0,0,0,0.3);     border-radius: 50%; }  .prev { left: 20px; } .next { right: 20px; }  .prev:hover, .next:hover {     background: rgba(255,255,255,0.2); }

<script> const repo = "katiabodypiercing/katiabodypiercing.github.io"; const folder = "joias";  let images = []; let currentIndex = 0;  fetch(`https://api.github.com/repos/${repo}/contents/${folder}`) .then(res => res.json()) .then(data => {     const gallery = document.getElementById("gallery");      data.forEach((file, index) => {         if(file.type === "file") {             images.push(file.download_url);              const img = document.createElement("img");             img.src = file.download_url;             img.onclick = () => openLightbox(index);              gallery.appendChild(img);         }     }); });  function openLightbox(index) {     currentIndex = index;     document.getElementById("lightbox").style.display = "flex";     document.getElementById("lightbox-img").src = images[index]; }  function closeLightbox() {     document.getElementById("lightbox").style.display = "none"; }  function nextImage() {     currentIndex = (currentIndex + 1) % images.length;     document.getElementById("lightbox-img").src = images[currentIndex]; }  function prevImage() {     currentIndex = (currentIndex - 1 + images.length) % images.length;     document.getElementById("lightbox-img").src = images[currentIndex]; } </script>  </body> </html>
